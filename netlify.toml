# Netlify build configuration for HONG NGUYEN Co.
# Static site — no build step required.

[build]
  publish = "."

# Decap CMS uses Git Gateway via Netlify Identity.
# Identity is enabled in the Netlify UI (Site Settings → Identity).
# The admin will commit to the same repo and trigger a redeploy automatically.

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets aggressively
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Allow Decap CMS to work
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Pretty URLs — /about -> /about.html automatically handled by Netlify
# No redirects needed for this site (all pages are .html)