# Netlify build configuration for HONG NGUYEN Co.
# Static site + serverless functions.

[build]
  publish = "."
  functions = "netlify/functions"

# Admin auth rewrite: /admin → /admin/index.html; /admin/editor → /admin/editor.html
# Netlify's pretty URLs handle /admin/index.html automatically.

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets aggressively
[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Admin no-cache
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Function: CORS for the function endpoint (allow same-origin GET/POST)
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"

# Required environment variables for netlify/functions/save-content.js:
#   GITHUB_TOKEN — PAT with `Contents: Read and write` on the repo
#   GITHUB_REPO  — e.g. "hogoshi2023-pixel/HN"
#   ALLOWED_USERS — optional comma-separated email allowlist (empty = any signed-in user)
# Set these in: Netlify dashboard → Site settings → Environment variables
